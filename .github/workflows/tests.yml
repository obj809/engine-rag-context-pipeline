name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # CPU-only torch — the PyPI default on Linux drags in multi-GB CUDA libs
      # the tests (and CI runners) can't use.
      - run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - run: pip install -r requirements.txt -r requirements-dev.txt

      - run: python -m pytest
