# Production compose for the engine ops tool on the VPS. Standalone — run this
# INSTEAD of docker-compose.yml. It is run-on-demand, NOT a service (nothing
# listens, so there is no `up`):
#   docker compose -f docker-compose-prod.yml run --rm engine                         # REPL
#   docker compose -f docker-compose-prod.yml run --rm engine python eval/run_eval.py # eval (no key)
#
# Joins vector-db (Postgres as db:5432) + webnet (LiteLLM as litellm:4000).
# Prereqs: the vector-db prod stack up; docker network create webnet; a .env with
#   OPENAI_API_KEY for the REPL (the eval runs without it).
services:
  engine:
    build: .
    stdin_open: true                                 # the REPL reads stdin
    tty: true
    environment:
      DATABASE_URL: postgresql://rag:rag@db:5432/rag # `db` on the vector-db network
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}            # LiteLLM virtual key; empty default so eval-only runs don't warn
      OPENAI_BASE_URL: http://litellm:4000/v1        # LiteLLM gateway, reached over webnet
    cpus: 1.5
    mem_limit: 2g
    mem_reservation: 512m
    networks:
      - vector-db
      - webnet

networks:
  vector-db:
    external: true
    name: vector-db-rag-context-pipeline_default
  webnet:
    external: true
    name: webnet
